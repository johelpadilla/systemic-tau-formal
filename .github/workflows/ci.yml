name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest -q
      - name: Golden export (smoke)
        run: python scripts/export_golden.py
      - name: Notebooks smoke (CLI)
        working-directory: ${{ github.workspace }}
        run: |
          python notebooks/02_aedes_puerto_rico.py
          python notebooks/04_p3_noise_robustness.py
          python notebooks/05_first_return_poincare.py
          python notebooks/06_cross_domain_c3.py
          python notebooks/03_falsifiability_test.py data/synthetic/regime_switch.csv

  lean:
    name: Lean lake build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lean
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Cache Lake / toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            lean/.lake
          key: lean-mathlib-${{ runner.os }}-${{ hashFiles('lean/lean-toolchain', 'lean/lake-manifest.json', 'lean/lakefile.lean') }}
          restore-keys: |
            lean-mathlib-${{ runner.os }}-
            lean-${{ runner.os }}-
      - name: Mathlib olean cache
        run: lake exe cache get || true
      - name: lake build
        run: lake build
        # Mathlib import closure; cache get keeps this tractable on Ubuntu.
